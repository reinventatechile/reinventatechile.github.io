<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reinvéntate · ¿Cómo llegamos hoy?</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #2a0710;
    font-family: Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    padding: 28px 40px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(217,160,171,0.15);
    flex-shrink: 0;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(217,160,171,0.55);
    font-family: Arial, sans-serif;
    margin-bottom: 10px;
  }
  .titulo {
    font-size: clamp(22px, 3vw, 36px);
    font-weight: 400;
    color: #F2EFEB;
    font-style: italic;
    line-height: 1.2;
  }
  .subtitulo {
    font-size: 13px;
    color: rgba(217,160,171,0.6);
    margin-top: 6px;
    font-family: Arial, sans-serif;
    letter-spacing: 1px;
  }

  /* ── CONTADOR ── */
  .counter-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 14px 40px;
    flex-shrink: 0;
  }
  .counter-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: rgba(242,215,220,0.5);
    letter-spacing: 1px;
  }
  .counter-num {
    font-size: 22px;
    font-family: Georgia, serif;
    color: #D9A0AB;
    font-weight: 400;
    min-width: 32px;
    text-align: center;
  }
  .live-dot {
    width: 8px;
    height: 8px;
    background: #D9A0AB;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.7); }
  }

  /* ── NUBE DE PALABRAS ── */
  .cloud-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 40px 40px;
    position: relative;
  }
  .cloud {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 14px 20px;
    max-width: 1100px;
    width: 100%;
  }
  .word {
    color: #F2EFEB;
    font-style: italic;
    line-height: 1;
    opacity: 0;
    transform: translateY(16px) scale(0.9);
    animation: appear 0.7s cubic-bezier(.22,1,.36,1) forwards;
    text-shadow: 0 2px 12px rgba(89,12,27,0.6);
    cursor: default;
    transition: color 0.3s;
  }
  .word:hover { color: #D9A0AB; }
  @keyframes appear {
    to { opacity: 1; transform: none; }
  }
  /* Tamaños por frecuencia */
  .freq-1 { font-size: clamp(18px, 2.2vw, 28px); color: rgba(242,239,235,0.55); }
  .freq-2 { font-size: clamp(24px, 3vw, 38px); color: rgba(242,239,235,0.72); }
  .freq-3 { font-size: clamp(32px, 4vw, 52px); color: #F2EFEB; }
  .freq-4 { font-size: clamp(42px, 5.5vw, 70px); color: #F2D8DC; }
  .freq-5 { font-size: clamp(54px, 7vw, 90px); color: #D9A0AB; font-weight: 400; }

  /* ── ESTADO VACÍO ── */
  .empty {
    text-align: center;
    padding: 40px;
  }
  .empty-ornament {
    font-size: 32px;
    color: rgba(217,160,171,0.3);
    margin-bottom: 18px;
  }
  .empty-text {
    font-size: 18px;
    font-style: italic;
    color: rgba(242,239,235,0.35);
    line-height: 1.6;
  }
  .empty-hint {
    font-size: 12px;
    color: rgba(217,160,171,0.3);
    font-family: Arial, sans-serif;
    letter-spacing: 1px;
    margin-top: 12px;
    text-transform: uppercase;
  }

  /* ── FOOTER ── */
  .footer {
    padding: 12px 40px;
    text-align: center;
    flex-shrink: 0;
    border-top: 1px solid rgba(217,160,171,0.1);
  }
  .footer span {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(217,160,171,0.2);
    text-transform: uppercase;
    font-family: Arial, sans-serif;
  }

  /* ── GRADIENTE FONDO ANIMADO ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(140,53,53,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(89,12,27,0.3) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .header, .counter-bar, .cloud-wrap, .footer { position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="header">
  <p class="eyebrow">Reinvéntate · Puerto Varas · En vivo</p>
  <h1 class="titulo">¿Cómo llegamos hoy?</h1>
  <p class="subtitulo">Las palabras de nuestra comunidad</p>
</div>

<div class="counter-bar">
  <div class="counter-item">
    <span class="live-dot"></span>
    <span>EN VIVO</span>
  </div>
  <div class="counter-item">
    <span class="counter-num" id="total">0</span>
    <span>RESPUESTAS</span>
  </div>
  <div class="counter-item">
    <span class="counter-num" id="unicas">0</span>
    <span>PALABRAS DISTINTAS</span>
  </div>
</div>

<div class="cloud-wrap">
  <div class="cloud" id="cloud">
    <div class="empty">
      <div class="empty-ornament">✦</div>
      <p class="empty-text">Las palabras aparecerán aquí<br>a medida que lleguen las respuestas</p>
      <p class="empty-hint">Actualizando cada 4 segundos</p>
    </div>
  </div>
</div>

<div class="footer">
  <span>reinventatechile.cl</span>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYch1y_reT3PfFcWmckkA7sLY8kA0rlP-iUs0gSAKp5L2yXn_bw7mGsuL4DF2CSISc/exec';
var lastTotal  = 0;

function buildFreqMap(words) {
  var map = {};
  words.forEach(function(w) {
    var clean = w.trim().toLowerCase().replace(/[.,!?;:]/g, '');
    if (!clean || clean.length < 2) return;
    // Capitalizar primera letra
    var display = clean.charAt(0).toUpperCase() + clean.slice(1);
    map[display] = (map[display] || 0) + 1;
  });
  return map;
}

function freqClass(n, max) {
  if (max <= 1) return 'freq-1';
  var pct = n / max;
  if (pct >= 0.8) return 'freq-5';
  if (pct >= 0.6) return 'freq-4';
  if (pct >= 0.4) return 'freq-3';
  if (pct >= 0.2) return 'freq-2';
  return 'freq-1';
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function renderCloud(words) {
  var cloud = document.getElementById('cloud');
  var total = words.length;

  document.getElementById('total').textContent = total;

  if (total === 0) {
    if (lastTotal !== 0) {
      cloud.innerHTML = '<div class="empty"><div class="empty-ornament">✦</div><p class="empty-text">Las palabras aparecerán aquí<br>a medida que lleguen las respuestas</p><p class="empty-hint">Actualizando cada 4 segundos</p></div>';
      lastTotal = 0;
    }
    return;
  }

  var map  = buildFreqMap(words);
  var keys = Object.keys(map);
  var max  = Math.max.apply(null, keys.map(function(k) { return map[k]; }));

  document.getElementById('unicas').textContent = keys.length;

  // Solo re-renderizar si cambia algo
  if (total === lastTotal) return;
  lastTotal = total;

  // Ordenar: más frecuentes al centro (mezclar un poco)
  var sorted = keys.sort(function(a, b) { return map[b] - map[a]; });
  var html = '';
  sorted.forEach(function(word, idx) {
    var delay = (idx * 0.06).toFixed(2);
    html += '<span class="word ' + freqClass(map[word], max) + '" ' +
            'style="animation-delay:' + delay + 's" ' +
            'title="' + map[word] + (map[word] === 1 ? ' vez' : ' veces') + '">' +
            word + '</span>';
  });

  cloud.innerHTML = html;
}

function poll() {
  fetch(SCRIPT_URL + '?action=checkin&t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(d) {
      renderCloud(d.words || []);
    })
    .catch(function() {
      // silencioso — reintenta en el siguiente ciclo
    });
}

poll();
setInterval(poll, 4000);
</script>
</body>
</html>
