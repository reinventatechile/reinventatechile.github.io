<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscripción Reinvéntate</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --burdo: #6B1226;
    --burdo-deep: #4D0D1B;
    --rosa: #FAE8EC;
    --text-dark: #3D0A16;
    --success: #2D7A4F;
    --error: #B85C00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Barlow Condensed', sans-serif;
    background: var(--rosa);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 32px rgba(107,18,38,0.10);
  }
  .icon { font-size: 56px; margin-bottom: 20px; }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--burdo-deep);
    margin-bottom: 12px;
  }
  p { font-size: 16px; line-height: 1.6; color: #5c2030; margin-bottom: 8px; }
  .sub { font-size: 14px; color: rgba(92,32,48,0.6); margin-top: 16px; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(107,18,38,0.2);
    border-top-color: var(--burdo);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn {
    display: inline-block;
    margin-top: 28px;
    padding: 12px 28px;
    background: var(--burdo);
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--burdo);
    color: var(--burdo);
    margin-left: 10px;
  }
  .state-loading .icon, .state-success .icon, .state-failed .icon, .state-pending .icon { display: none; }
  .state-loading .spinner { display: block; }
  .state-success .icon-ok, .state-failed .icon-fail, .state-pending .icon-pending { display: block; }
  .spinner { display: none; }
  #btn-retry { display: none; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <div class="icon icon-ok" id="icon-ok">✅</div>
  <div class="icon icon-fail" id="icon-fail">⚠️</div>
  <div class="icon icon-pending" id="icon-pending">⏳</div>
  <h1 id="titulo">Verificando tu pago...</h1>
  <p id="mensaje">Estamos confirmando el estado de tu transacción.</p>
  <p class="sub" id="sub"></p>
  <div id="botones"></div>
</div>

<script>
// URL del Apps Script (mismo que el formulario)
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzoTAyWRa1FPuVwCpCzJvWf4lwK8Xe5curhSct126G-uuJtwETtAvuqFSJ_fDK656kR/exec';

function getParam(name) {
  var params = new URLSearchParams(window.location.search);
  return params.get(name);
}

function showState(state, titulo, mensaje, sub, botones) {
  document.getElementById('spinner').style.display = state === 'loading' ? 'block' : 'none';
  document.getElementById('icon-ok').style.display = state === 'success' ? 'block' : 'none';
  document.getElementById('icon-fail').style.display = state === 'failed' ? 'block' : 'none';
  document.getElementById('icon-pending').style.display = state === 'pending' ? 'block' : 'none';
  document.getElementById('titulo').textContent = titulo;
  document.getElementById('mensaje').textContent = mensaje;
  document.getElementById('sub').innerHTML = sub || '';
  document.getElementById('botones').innerHTML = botones || '';
}

var token = getParam('token');

if (!token) {
  // Llegó sin token — redirigir al formulario
  showState('pending',
    'Sesión expirada',
    'No encontramos información de tu pago.',
    '',
    '<a href="/inscripcion/" class="btn">Volver al formulario</a>'
  );
} else {
  // Mostrar estado de carga
  showState('loading', 'Verificando tu pago...', 'Estamos confirmando el estado de tu transacción.', '', '');

  // Verificar estado del pago con nuestro Apps Script
  fetch(APPS_SCRIPT_URL + '?action=verificarPago&token=' + encodeURIComponent(token))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === 'confirmado') {
        showState('success',
          '¡Tu inscripción está confirmada!',
          'Tu pago fue recibido con éxito. En breve recibirás un correo con los detalles del evento.',
          'Sábado 27 de junio · 10:00 hrs · Hotel Borde Lago, Puerto Varas',
          '<a href="https://reinventatechile.cl" class="btn">Ir al sitio</a>'
        );
      } else if (data.status === 'pendiente') {
        showState('pending',
          'Pago en proceso',
          'Tu inscripción está siendo procesada. Recibirás un correo de confirmación cuando se complete.',
          'Si tienes dudas escríbenos a contacto@reinventatechile.cl',
          '<a href="https://reinventatechile.cl" class="btn">Ir al sitio</a>'
        );
      } else {
        // No confirmado / fallido
        showState('failed',
          'El pago no pudo procesarse',
          'Tu transacción no fue completada. Puedes intentarlo de nuevo o pagar por transferencia.',
          'Si el problema persiste escríbenos a contacto@reinventatechile.cl',
          '<a href="/inscripcion/" class="btn">Intentar de nuevo</a>'
        );
      }
    })
    .catch(function() {
      // Error de red — mostrar mensaje neutral
      showState('pending',
        'Gracias por tu inscripción',
        'Tu solicitud fue recibida. Si el pago fue exitoso, recibirás un correo de confirmación en los próximos minutos.',
        'Si no recibes correo en 10 minutos, escríbenos a contacto@reinventatechile.cl',
        '<a href="https://reinventatechile.cl" class="btn">Ir al sitio</a>'
      );
    });
}
</script>
</body>
</html>
